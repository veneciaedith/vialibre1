<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VíaLibre — Sistema operativo del comercio</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2b4a;--navy2:#0f1d35;
  --olive:#8b9460;--olive2:#6f7649;--olive3:#d3d9b8;
  --bg:#f4f6f8;--card:#fff;
  --ink:#1a2b4a;--muted:#6b7280;
  --green:#4caf50;--green2:#e8f5e9;
  --yellow:#f0c040;--red:#e74c3c;--red2:#fdecea;
  --border:#e5e7eb;--border2:#f0f2f5;
  --r:14px;--r2:10px;
}
html,body,#root{height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink)}
button{font-family:inherit;cursor:pointer}

/* TOPBAR */
.topbar{background:var(--navy);color:#fff;position:sticky;top:0;z-index:50;padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:12px}
.brand-mark{width:38px;height:38px;background:#fff;color:var(--navy);display:grid;place-items:center;font-weight:800;font-size:18px;border-radius:10px}
.brand-name{font-weight:800;font-size:20px}
.brand-name span{color:var(--olive3)}
.shop-dot{width:8px;height:8px;border-radius:50%;background:#7cd17c;box-shadow:0 0 8px #7cd17c;display:inline-block;margin-right:8px}

/* LAYOUT */
.layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 62px)}
.sidebar{background:#fff;border-right:1px solid var(--border);padding:16px 0;position:sticky;top:62px;height:calc(100vh - 62px);overflow-y:auto;display:flex;flex-direction:column}
.nav-sec-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);padding:0 20px 6px;margin-top:16px;font-weight:600;font-family:'JetBrains Mono',monospace}
.nav-btn{display:flex;align-items:center;gap:12px;padding:11px 16px;margin:2px 10px;border-radius:10px;font-size:14px;font-weight:500;color:var(--muted);background:none;border:none;width:calc(100% - 20px);text-align:left;transition:all .15s;cursor:pointer}
.nav-btn:hover{background:var(--bg);color:var(--ink)}
.nav-btn.active{background:var(--navy);color:#fff;font-weight:600}
.nav-icon{font-size:16px;width:20px;text-align:center}
.nav-foot{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);line-height:1.7}
.main{padding:32px 36px 60px;max-width:1300px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:22px;position:relative;box-shadow:0 1px 3px rgba(15,29,53,.05)}
.card-title{font-weight:700;font-size:18px;margin-bottom:4px}
.card-sub{font-size:13px;color:var(--muted);margin-bottom:16px}
.tag{display:inline-flex;align-items:center;background:var(--bg);color:var(--muted);font-size:10px;letter-spacing:.1em;padding:4px 10px;border-radius:6px;margin-bottom:12px;font-weight:600;font-family:'JetBrains Mono',monospace;text-transform:uppercase}
.tag.navy{background:var(--navy);color:#fff}
.tag.olive{background:var(--olive);color:#fff}

/* PAGE HEAD */
.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;flex-wrap:wrap;gap:16px}
.page-title{font-weight:800;font-size:38px;letter-spacing:-.03em;line-height:1.05}
.page-title em{font-style:normal;color:var(--olive);font-weight:700}
.page-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);text-align:right;letter-spacing:.1em}
.page-meta .now{color:var(--navy);font-weight:700}

/* KPIs */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:18px 20px}
.kpi-label{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:8px}
.kpi-val{font-weight:800;font-size:26px;letter-spacing:-.02em}
.kpi-delta{margin-top:8px;font-size:12px;font-weight:600}
.kpi-delta.up{color:var(--green)}
.kpi-delta.dn{color:var(--red)}

/* GRIDS */
.g2{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;margin-bottom:18px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}

/* SEMAFORO ITEM */
.sem-item{display:grid;grid-template-columns:14px 1fr auto auto;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--border2)}
.sem-item:last-child{border:none}
.dot{width:12px;height:12px;border-radius:50%}
.dot.r{background:var(--red);box-shadow:0 0 0 3px rgba(231,76,60,.15)}
.dot.y{background:var(--yellow);box-shadow:0 0 0 3px rgba(240,192,64,.15)}
.dot.g{background:var(--green);box-shadow:0 0 0 3px rgba(76,175,80,.15)}
.pname{font-weight:600;font-size:14px}
.pmeta{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px}
.mbar{width:80px;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;position:relative}
.mbar-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px}
.mpct{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;min-width:46px;text-align:right}

/* SCANNER CARD */
.scanner-card{background:var(--navy);color:#fff;border:none;border-radius:var(--r);overflow:hidden;padding:24px;position:relative}
.scanner-card::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 80% 20%,rgba(139,148,96,.2) 0%,transparent 50%);pointer-events:none}
.scan-eye{width:64px;height:64px;border:2px solid var(--olive3);border-radius:14px;display:grid;place-items:center;margin-bottom:14px;position:relative;font-size:28px}
.scan-line{position:absolute;left:6px;right:6px;height:2px;background:var(--olive3);animation:scan 2.5s ease-in-out infinite;border-radius:2px}
@keyframes scan{0%,100%{top:6px}50%{top:calc(100% - 8px)}}
.scan-title{font-weight:700;font-size:20px;margin-bottom:8px}
.scan-desc{font-size:13px;opacity:.8;margin-bottom:18px;line-height:1.5}
.btn-scan{background:var(--olive);color:#fff;border:none;padding:11px 20px;font-weight:700;font-size:14px;border-radius:10px;display:inline-flex;align-items:center;gap:8px;cursor:pointer;transition:background .15s}
.btn-scan:hover{background:var(--olive2)}

/* VOICE CARD */
.voice-card{position:relative;overflow:hidden}
.mic-btn{width:70px;height:70px;border-radius:50%;background:var(--navy);color:#fff;border:none;display:grid;place-items:center;cursor:pointer;font-size:28px;transition:all .2s;box-shadow:0 6px 20px -4px rgba(26,43,74,.4);margin:0 auto 14px}
.mic-btn:hover{transform:scale(1.06)}
.mic-btn.rec{background:var(--red);animation:pulse 1.4s infinite}
.mic-btn.rec::before,.mic-btn.rec::after{content:"";position:absolute;border-radius:50%;border:2px solid var(--red);animation:ripple 1.4s infinite;left:50%;top:0;transform:translateX(-50%);width:70px;height:70px}
.mic-btn.rec::after{animation-delay:.7s}
@keyframes pulse{50%{transform:scale(1.06)}}
@keyframes ripple{0%{opacity:.6;transform:translateX(-50%) scale(1)}100%{opacity:0;transform:translateX(-50%) scale(1.6)}}
.wave{display:flex;align-items:center;justify-content:center;gap:3px;height:40px;margin:10px 0}
.wbar{width:3px;background:var(--olive);border-radius:3px}
.wbar.anim{animation:wave 1s ease-in-out infinite}
@keyframes wave{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}
.transcript{background:var(--bg);border-radius:10px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:12px;min-height:56px;color:var(--ink);line-height:1.6}

/* CHAT */
.chat-card{background:#e7e3db;border:none;padding:0;overflow:hidden}
.chat-head{background:#075e54;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px}
.chat-avatar{width:36px;height:36px;background:#fff;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:13px;color:#075e54}
.chat-body{padding:16px;display:flex;flex-direction:column;gap:10px;max-height:360px;overflow-y:auto}
.msg{background:#fff;padding:10px 13px;border-radius:14px 14px 14px 4px;font-size:13px;line-height:1.55;max-width:90%;box-shadow:0 1px 1px rgba(0,0,0,.06);white-space:pre-line}
.msg.me{background:#d9fdd3;border-radius:14px 14px 4px 14px;align-self:flex-end;margin-left:auto}
.msg-time{font-size:10px;color:var(--muted);margin-top:4px;display:block;text-align:right}
.chat-actions{display:flex;flex-direction:column;gap:6px;align-self:flex-start;width:90%}
.chat-action-btn{background:#fff;border:none;padding:10px 14px;border-radius:10px;font-weight:600;font-size:13px;color:var(--navy);text-align:center;cursor:pointer;transition:background .15s}
.chat-action-btn:hover{background:var(--bg)}
.chat-action-btn.danger{color:var(--red)}
.chat-input{display:flex;gap:8px;padding:10px;background:#f0f2f5;align-items:center}
.chat-input input{flex:1;background:#fff;border:none;padding:10px 14px;border-radius:20px;font-size:13px;font-family:inherit;outline:none}
.chat-input button{background:#075e54;color:#fff;border:none;width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-size:18px}

/* BTNS */
.btn{background:var(--navy);color:#fff;border:none;padding:12px 20px;font-weight:700;font-size:14px;border-radius:10px;cursor:pointer;transition:background .15s}
.btn:hover{background:var(--navy2)}
.btn.olive{background:var(--olive)}
.btn.olive:hover{background:var(--olive2)}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--border)}
.btn.ghost:hover{background:var(--bg)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(15,29,53,.6);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px);padding:20px}
.modal-box{background:#fff;width:540px;max-width:100%;max-height:90vh;overflow:auto;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-head{background:var(--navy);color:#fff;padding:16px 22px;display:flex;justify-content:space-between;align-items:center;border-radius:20px 20px 0 0}
.modal-head h3{font-weight:700;font-size:17px}
.modal-close{background:rgba(255,255,255,.1);border:none;color:#fff;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;cursor:pointer;font-size:16px}
.modal-body{padding:22px}
.scan-preview-box{background:var(--navy);height:220px;border-radius:12px;display:grid;place-items:center;color:#fff;margin-bottom:18px;position:relative;overflow:hidden}
.scan-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(139,148,96,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(139,148,96,.18) 1px,transparent 1px);background-size:22px 22px}
.scan-beam{position:absolute;left:16px;right:16px;height:3px;background:var(--olive3);box-shadow:0 0 18px var(--olive3);border-radius:3px;animation:scan 1.8s ease-in-out infinite}
.scan-center{position:relative;z-index:1;text-align:center}
.blink{animation:blink 1s infinite;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--olive3);letter-spacing:.18em;font-weight:700}
@keyframes blink{50%{opacity:0}}
.scan-line-item{display:grid;grid-template-columns:1fr auto auto;gap:10px;padding:10px 0;border-bottom:1px solid var(--border2);font-size:13px}
.scan-line-item:last-child{border:none}
.scan-qty{font-family:'JetBrains Mono',monospace;color:var(--muted)}
.scan-price{font-family:'JetBrains Mono',monospace;font-weight:700}
.scan-total{display:flex;justify-content:space-between;padding:12px 0 0;margin-top:6px;border-top:2px solid var(--navy);font-size:18px;font-weight:800}

/* WEB3 */
.collateral-card{background:var(--navy);color:#fff;border:none;border-radius:var(--r);padding:26px;position:relative;overflow:hidden}
.collateral-card::before{content:"";position:absolute;top:-30%;right:-15%;width:280px;height:280px;background:radial-gradient(circle,rgba(139,148,96,.22) 0%,transparent 60%);pointer-events:none}
.col-inner{position:relative;z-index:1}
.col-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;color:var(--olive3);text-transform:uppercase;margin-bottom:12px;font-weight:600}
.col-val{font-weight:800;font-size:46px;line-height:1;letter-spacing:-.03em;margin-bottom:6px}
.col-unit{font-size:16px;font-weight:500;opacity:.6;margin-left:6px}
.col-desc{font-size:13px;opacity:.75;line-height:1.55;margin-bottom:20px}
.col-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.col-stat{background:rgba(255,255,255,.08);padding:12px;border-radius:10px}
.col-stat .l{font-size:10px;opacity:.55;text-transform:uppercase;letter-spacing:.1em;font-family:'JetBrains Mono',monospace;margin-bottom:4px}
.col-stat .v{font-weight:700;font-size:18px}
.col-bars{display:flex;gap:5px;align-items:flex-end;height:70px;margin-bottom:16px}
.col-bar{flex:1;border-radius:3px 3px 0 0;opacity:.85}

/* INV TABLE */
.inv-table{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;margin-top:18px}
.inv-head{display:grid;grid-template-columns:50px 2fr 1fr 1fr 1fr 1.2fr 70px;gap:12px;padding:12px 18px;background:var(--bg);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600;font-family:'JetBrains Mono',monospace}
.inv-row{display:grid;grid-template-columns:50px 2fr 1fr 1fr 1fr 1.2fr 70px;gap:12px;padding:13px 18px;border-top:1px solid var(--border2);align-items:center;font-size:13px;cursor:pointer;transition:background .15s}
.inv-row:hover{background:var(--bg)}
.inv-code{width:40px;height:40px;background:var(--bg);border-radius:8px;display:grid;place-items:center;font-weight:800;font-size:13px;color:var(--navy)}
.sbar-wrap{display:flex;align-items:center;gap:6px}
.sbar{height:6px;flex:1;background:var(--bg);border-radius:3px;overflow:hidden;min-width:36px}
.sbar-fill{height:100%;border-radius:3px}

/* SEARCH */
.search-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-in{flex:1;min-width:180px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-size:13px;font-family:inherit;outline:none}
.search-in:focus{border-color:var(--navy)}
.chip{padding:7px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--muted)}
.chip:hover{background:var(--bg);color:var(--ink)}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}

/* SCORE RING */
.score-ring-wrap{display:grid;place-items:center;padding:18px;background:var(--bg);border-radius:12px}
.score-ring{width:180px;height:180px;position:relative}
.score-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.score-num{position:absolute;inset:0;display:grid;place-items:center;font-weight:800;font-size:44px;letter-spacing:-.03em}
.score-num small{font-size:13px;color:var(--muted);font-weight:500}

/* COMMUNITY */
.comm-row{display:flex;align-items:center;gap:12px;padding:16px 0;border-bottom:1px solid var(--border2)}
.comm-row:last-child{border:none}
.comm-graph{flex:2;height:32px;background:var(--bg);border-radius:6px;position:relative;margin:0 14px}
.comm-line{position:absolute;top:0;bottom:0;width:3px;border-radius:2px}
.comm-you-lbl{position:absolute;top:-18px;font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:700;transform:translateX(-50%);white-space:nowrap}
.comm-avg-lbl{position:absolute;bottom:-18px;font-size:10px;font-family:'JetBrains Mono',monospace;transform:translateX(-50%);white-space:nowrap;color:var(--muted)}

/* TOAST */
.toast-wrap{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:200;transition:all .3s;pointer-events:none}
.toast-box{background:var(--navy);color:#fff;padding:13px 22px;border-radius:12px;font-size:14px;font-weight:500;border-left:3px solid var(--green);box-shadow:0 12px 30px rgba(0,0,0,.25);white-space:nowrap}

/* TICKER */
.ticker{background:var(--navy2);color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;padding:9px 0;overflow:hidden;white-space:nowrap}
.ticker-track{display:inline-block;animation:ticker 40s linear infinite}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ticker span{margin:0 26px;color:var(--olive3)}
.ticker em{font-style:normal;opacity:.55}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade{animation:fadeUp .35s ease}

/* RULES */
.rule-item{display:flex;align-items:center;gap:12px;padding:13px;background:var(--card);border:1px solid var(--border2);border-radius:10px;margin-bottom:8px}
.sw{width:36px;height:20px;background:var(--border);border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.sw::after{content:"";position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sw.on{background:var(--olive)}
.sw.on::after{transform:translateX(16px)}

/* ESCROW */
.esc-step{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:11px 0;position:relative}
.esc-dot{width:28px;height:28px;border-radius:50%;background:var(--bg);border:2px solid var(--border);display:grid;place-items:center;font-weight:700;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted)}
.esc-step.done .esc-dot{background:var(--green);color:#fff;border-color:var(--green)}
.esc-step.act .esc-dot{background:var(--olive);color:#fff;border-color:var(--olive);animation:pulse 1.5s infinite}
.esc-step:not(:last-child)::after{content:"";position:absolute;left:13px;top:40px;width:2px;height:16px;background:var(--border)}
.esc-step.done:not(:last-child)::after{background:var(--green)}
.esc-l{font-weight:600;font-size:14px}
.esc-s{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px}
.esc-amt{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:var(--navy)}

@media(max-width:1000px){
  .layout{grid-template-columns:1fr}
  .sidebar{position:relative;top:0;height:auto;flex-direction:row;overflow-x:auto;padding:8px;border-right:none;border-bottom:1px solid var(--border)}
  .nav-sec-label,.nav-foot{display:none}
  .nav-btn{width:auto;white-space:nowrap;margin:0 4px;padding:8px 12px}
  .kpi-row{grid-template-columns:1fr 1fr}
  .g2,.g3{grid-template-columns:1fr}
  .main{padding:20px 16px 50px}
  .inv-head,.inv-row{grid-template-columns:40px 2fr 1fr 70px}
  .inv-head .h3,.inv-head .h4,.inv-head .h5,.inv-row .c3,.inv-row .c4,.inv-row .c5{display:none}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ============ DATA ============
const INVENTORY = [
  {id:'ccola',code:'CC',name:'Coca-Cola 2.25L',cat:'Bebidas',cost:1380,pvp:1900,stock:42,opt:50,st:'g',margin:38},
  {id:'aceite',code:'AC',name:'Aceite Cocinero 900ml',cat:'Almacén',cost:1880,pvp:1920,stock:6,opt:24,st:'r',margin:2.1,alert:'COSTO ↑18%'},
  {id:'yerba',code:'YR',name:'Yerba Rosamonte 1kg',cat:'Almacén',cost:2450,pvp:2800,stock:14,opt:25,st:'y',margin:14,alert:'FLETE ALTO'},
  {id:'pan',code:'PL',name:'Pan Lactal Bimbo',cat:'Panadería',cost:680,pvp:890,stock:10,opt:28,st:'y',margin:31,alert:'STOCK BAJO'},
  {id:'harina',code:'HP',name:'Harina Pureza 1kg',cat:'Almacén',cost:980,pvp:1030,stock:28,opt:30,st:'r',margin:4.8,alert:'AJUSTAR PVP'},
  {id:'detergente',code:'DM',name:'Detergente Magistral',cat:'Limpieza',cost:1250,pvp:1230,stock:18,opt:20,st:'r',margin:-1.4,alert:'PERDIDA $20/u'},
  {id:'arroz',code:'AG',name:'Arroz Gallo Doble 1kg',cat:'Almacén',cost:890,pvp:1250,stock:3,opt:20,st:'g',margin:40,alert:'STOCK CRITICO'},

              <button className="chat-action-btn" style={{background:'var(--navy)',color:'#fff'}} onClick={()=>{setMsgs(m=>[...m,{from:'me',text:'Sí confirmo',time:'ahora'}]);setTimeout(()=>setMsgs(m=>[...m,{from:'bot',text:'✓ Escrow desplegado en Braga Chain.',time:'ahora'}]),800)}}>SÍ, PEDIR Y PAGAR</button>
              <button className="chat-action-btn danger" onClick={()=>setMsgs(m=>[...m,{from:'me',text:'Cancelar',time:'ahora'},{from:'bot',text:'Pedido cancelado.',time:'ahora'}])}>CANCELAR</button>
            </div>
          </div>
          <div className="chat-input">
            <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="Escribí un mensaje..."/>
            <button onClick={send}>➤</button>
          </div>
        </div>
        <div className="card">
          <div className="tag navy">REGLAS ACTIVAS</div>
          <div className="card-title">Automatizaciones</div>
          <div className="card-sub">El asistente actúa cuando se cumplen estas condiciones</div>
          {rules.map((r,i)=>(
            <div key={i} className="rule-item">
              <div className={`sw${r.on?' on':''}`} onClick={()=>setRules(rs=>rs.map((x,j)=>j===i?{...x,on:!x.on}:x))}/>
              <div><div style={{fontWeight:600,fontSize:14}}>{r.name}</div><div style={{fontSize:11,color:'var(--muted)',fontFamily:'JetBrains Mono,monospace',marginTop:3}}>{r.desc}</div></div>
            </div>
          ))}
          <button className="btn" style={{width:'100%',marginTop:14}} onClick={()=>showToast('Nueva regla creada.')}>+ Nueva regla</button>
        </div>
      </div>
    </div>
  );
}

// ============ APP ============
function App(){
  const [page,setPage]=useState('panel');

  const [scanner,setScanner]=useState(false);
  const toastTimer=useRef(null);

  const showToast=useCallback((msg)=>{
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current=setTimeout(()=>setToast(null),3200);
  },[]);

  const openScanner=()=>setScanner(true);

  const onScanConfirm=(lines)=>{
    setInv(prev=>{
      const next=[...prev];
      lines.forEach(l=>{const i=next.findIndex(p=>p.name.includes(l.name.split(' ')[0]));if(i>=0)next[i]={...next[i],stock:next[i].stock+l.qty};});
      return next;
    });
    setScanner(false);
    showToast(`✅ ${lines.length} productos cargados al inventario`);
  };

  const nav=[
    {id:'panel',icon:'🏠',label:'Panel'},
    {id:'inventario',icon:'📦',label:'Inventario'},
    {id:'escaner',icon:'📷',label:'Escáner'},
    {id:'voz',icon:'🎤',label:'Voz'},
    {id:'semaforo',icon:'🚦',label:'Semáforo'},
    {id:'comunidad',icon:'👥',label:'Comunidad'},
    {id:'asistente',icon:'💬',label:'Asistente'},
    {id:'capital',icon:'⛓️',label:'Capital Web3'},
    {id:'score',icon:'📊',label:'Score'},
  ];

  const pages={
    panel:<Dashboard inv={inv} setInv={setInv} showToast={showToast} openScanner={openScanner}/>,
    inventario:<Inventario inv={inv} setInv={setInv} showToast={showToast}/>,
    escaner:<div className="fade"><div className="page-head"><div><h1 className="page-title">Escáner <em>inteligente.</em></h1></div></div><div className="g2"><div className="scanner-card"><div className="scan-eye">📄<div className="scan-line"/></div><div className="scan-title">Una foto. Todo el ticket cargado.</div><div className="scan-desc">Funciona con tickets impresos, fotos de WhatsApp y PDFs. Detecta productos, cantidades, precios, IVA y descuentos.</div><button className="btn-scan" onClick={openScanner}>📷 Escanear factura</button></div><div className="card"><div className="tag navy">HISTORIAL</div><div className="card-title">Últimas facturas</div>{[{p:'Distribuidora Rosario',n:23,t:48220,d:'HOY'},{p:'Lácteos del Litoral',n:11,t:22110,d:'AYER'},{p:'Bimbo Argentina',n:8,t:15640,d:'26/05'},{p:'Coca-Cola FEMSA',n:7,t:18940,d:'25/05'}].map((f,i)=><div key={i} className="sem-item"><span className="dot g"/><div><div className="pname">{f.p}</div><div className="pmeta">{f.n} PRODUCTOS · ${f.t.toLocaleString('es-AR')}</div></div><div className="mpct" style={{color:'var(--muted)',fontSize:11}}>{f.d}</div></div>)}<button className="btn" style={{width:'100%',marginTop:14}} onClick={openScanner}>+ Nueva factura</button></div></div></div>,

        </div>
      </header>

      <div className="layout">
        <aside className="sidebar">
          {nav.map(n=>(
            <button key={n.id} className={`nav-btn${page===n.id?' active':''}`} onClick={()=>setPage(n.id)}>
              <span className="nav-icon">{n.icon}</span>{n.label}
            </button>
          ))}
          <div className="nav-foot">v2.6.0 · ESTABLE<br/>Bloque #847.225<br/>Casilda · AR · UTC-3</div>
        </aside>
        <main className="main">{pages[page]||pages.panel}</main>
      </div>

      <div className="ticker">
        <div className="ticker-track">
          <em>USDC/ARS</em><span>1.247,80 ▲</span><em>VLA TOKEN</em><span>$0,148 ▲ 2,4%</span><em>BASE GAS</em><span>0,0001 USDC</span><em>COMERCIOS</em><span>4.812 ▲</span><em>BLOQUE</em><span>#847.225</span>
          <em>USDC/ARS</em><span>1.247,80 ▲</span><em>VLA TOKEN</em><span>$0,148 ▲ 2,4%</span><em>BASE GAS</em><span>0,0001 USDC</span><em>COMERCIOS</em><span>4.812 ▲</span><em>BLOQUE</em><span>#847.225</span>

      </div>

      {scanner&&<ScannerModal onClose={()=>setScanner(false)} onConfirm={onScanConfirm}/>}

  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
